<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body{
            /* background: linear-gradient(120deg, #1a2a6c, #b21f1f, #fdbb2d); */
            background: #00031e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .loggin-container{
            width: 350px;
            background-color: #211e1e;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            color: #fff;
            padding: 30px;
            border-radius: 12px;
        }
        .loggin-container h2{
           color: #fff;
           margin-bottom: 25px;
           text-align: center;
           /* text-transform: uppercase; */
           letter-spacing: 2px;
        }
        .input-group{
            margin-bottom: 20px;
        }
        .input-group label{
            display: block;
            color: #bbb;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .input-group input{
            width: 100%;
            padding: 12px;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: #fdbb2d;
        }
        
        /* Login Button */
        button{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #fdbb2d;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        button[type="submit"]:hover {
            background-color: #ffa500;
        }

        /* Social Buttons */
        .social-btns {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }
        /* .social-btns button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            font-size: 12px;
            transition: 0.3s;
        } */
        .google-btns {
            background-color: #db4437;
        }
        .facebook-btns {
            background-color: #4267B2;
        }
        .social-btns button:hover {
            opacity: 0.8;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }
        .footer-text a {
            color: #fdbb2d;
            text-decoration: none;
        }
        .background-circle{
            position: absolute;
            width: 400px;
            height: 400px;
            background-color: #ab3030;
            top: -100px;
            left: -100px;
            border-radius: 50%;
            filter: blur(120px);
        }
        .background-circle:nth-child(2){
            top: auto;
            left: auto;
            bottom: -100px;
            right: -100px;
            background-color: rgb(3, 28, 167);
            /* top: -100px;
            left: -100px;
            bottom: auto;
            right: auto; */
        }
    </style>
</head>
<body>
    <div class="background-circle"></div>
    <div class="background-circle"></div>
    <div class="loggin-container">
        <h2>Login</h2>
        <form action="#">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your name" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit">LOGIN</button>
            
            <div class="social-btns">
                <button type="button" class="google-btns">Google</button>
                <button type="button" class="facebook-btns">Facebook</button>
            </div>

            <div class="footer-text">
                Don't have an account? <a href="#">Sign Up</a>
            </div>
        </form>
    </div>
</body>
</html>
