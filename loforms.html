<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Form</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(120deg, #4facfe, #00f2fe);
}

/* Container */
.container {
    position: relative;
    width: 700px;
    height: 400px;
    background: white;
    border-radius: 12px;
    /* overflow: hidden; */
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Login form */
.form-container {
    position: absolute;
    width: 50%;
    height: 100%;
    left: 0;
    padding: 40px;
    transition: all 0.6s ease-in-out;
}

.form-container h2 {
    margin-bottom: 20px;
}

.form-container input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.form-container button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #4facfe;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

.form-container button:hover {
    background: #007bff;
}

/* Cover */
.cover {
    position: absolute;
    width: 50%;
    height: 100%;
    right: 0;
    background: linear-gradient(120deg, #007bff, #00c6ff);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: transform 0.6s ease-in-out;
}

/* Animation */
.container:hover .cover {
    transform: translateX(-100%);
}

.container:hover .form-container {
    transform: translateX(100%);
}
</style>

</head>
<body>

<div class="container">
    
    <div class="form-container">
        <h2>Login</h2>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <div class="cover">
        <h1>Welcome!</h1>
        <p>Login to continue</p>
    </div>

</div>

</body>
</html>
